<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Repeating background tile: soft pastel with math symbols -->
  <rect width="100" height="100" fill="#fffbea"/>
  <!-- Plus -->
  <text x="12" y="28" font-family="serif" font-size="22" fill="#f7c948" opacity="0.35">+</text>
  <!-- Multiply -->
  <text x="58" y="22" font-family="serif" font-size="18" fill="#6ec6f0" opacity="0.35">×</text>
  <!-- Divide -->
  <text x="78" y="60" font-family="serif" font-size="20" fill="#f7c948" opacity="0.35">÷</text>
  <!-- Equals -->
  <text x="10" y="72" font-family="serif" font-size="20" fill="#6ec6f0" opacity="0.35">=</text>
  <!-- Star -->
  <text x="44" y="90" font-family="serif" font-size="18" fill="#f7c948" opacity="0.25">★</text>
  <!-- Minus -->
  <text x="62" y="46" font-family="serif" font-size="22" fill="#6ec6f0" opacity="0.25">−</text>
</svg>
